name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # ── Start Redis service for Celery ──
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"  # match your deployment target

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit coverage

      - name: Lint code with flake8
        run: |
          flake8 . --max-line-length=120 --exclude=migrations,__pycache__,.git

      - name: Security scan with Bandit
        run: |
          bandit -r . --severity-level medium --exclude ./.git,./migrations,./tests

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: cicdproject.settings
          CELERY_TASK_ALWAYS_EAGER: "True"   # run Celery tasks synchronously in tests
          CELERY_BROKER_URL: redis://localhost:6379/0
        run: |
        
          coverage run manage.py test
          coverage report --fail-under=70

      - name: Trigger Render Deploy
        if: success()
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl "$RENDER_DEPLOY_HOOK"