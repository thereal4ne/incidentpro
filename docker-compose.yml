version: '3.9'

services:

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # ── Django Backend ──
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - media_files:/app/media

  # ── Celery Worker ──
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: celery -A cicdproject worker --loglevel=info --pool=solo
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - web
    volumes:
      - media_files:/app/media

  # ── Celery Beat ──
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: celery -A cicdproject beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - web
    volumes:
      - media_files:/app/media

  # ── React Frontend ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  media_files:

environment:
  - CELERY_BROKER_URL=redis://redis:6379/0
  - ALLOWED_HOSTS=127.0.0.1,localhost,0.0.0.0